    url: >-
      https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ChinaMax/ChinaMax_Domain.yaml
    path: ./ruleset/China_Domain.yaml
  Privacy:
    behavior: classical
    interval: 86400
    format: yaml
    type: http
    url: >-
      https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Privacy/Privacy_Classical.yaml
    path: ./ruleset/Privacy_Classical.yaml
  Lan:
    behavior: classical
    interval: 86400
    format: yaml
    type: http
