rules:
  - DOMAIN-KEYWORD,jyq.,    DIRECT
  - RULE-SET,Lan,           DIRECT
  - RULE-SET,Privacy,       AdBlock
  - RULE-SET,AdBlock,       AdBlock
  - RULE-SET,Hijacking,     AdBlock
  - RULE-SET,BlockRevise,   AdBlock
  - RULE-SET,DirectRevise,  DIRECT
  - RULE-SET,Game_Download, DIRECT
  - RULE-SET,Download,      DIRECT
  - RULE-SET,Emby,          Emby
  - RULE-SET,Game,          Game
  - RULE-SET,Apple,         Apple
  - RULE-SET,Microsoft,     Microsoft
  - RULE-SET,ProxyRevise,   GLOBAL
  - RULE-SET,Application_CN,DIRECT
  - RULE-SET,Direct,        DIRECT
  - RULE-SET,Global,        GLOBAL
  - RULE-SET,Global_Domain, GLOBAL
  - RULE-SET,China,         DIRECT
  - RULE-SET,China_Domain,  DIRECT
  - RULE-SET,Hijacking_DNS, GLOBAL
  - RULE-SET,ChinaIP,       DIRECT
  - GEOIP,CN,               DIRECT
  - MATCH,                  FINAL