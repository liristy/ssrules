    path: ./ruleset/Microsoft.yaml
  Game:
    behavior: classical
    interval: 86400
    format: yaml
    type: http
    url: >-
      https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Game/Game.yaml
    path: ./ruleset/Game.yaml
  Game_Download:
    behavior: classical
    interval: 86400
    format: yaml
    type: http
    url: >-
      https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Game/GameDownloadCN/GameDownloadCN.yaml
    path: ./ruleset/GameDownloadCN.yaml
  Global:
    behavior: classical
    interval: 86400
    format: yaml
    type: http
    url: >-
      https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Global/Global.yaml
    path: ./ruleset/Global.yaml
  Global_Domain:
    behavior: domain
    interval: 86400
    format: yaml
    type: http
    url: >-
